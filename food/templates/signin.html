{% extends 'base.html' %}
{% load static %}

{% block title %}- Sign In{% endblock %}

{% block content %}
    <section class="page-header">
        <div class="container">
            <h1>Welcome Back</h1>
            <p>Login to your account to start ordering.</p>
        </div>
    </section>

    <section class="section-padding pt-0">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5">
                    <div class="premium-form-container">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="form-group">
                                <label class="form-label fw-bold">Username</label>
                                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                            </div>
                            <div class="form-group mt-4">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mt-3 mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="remember">
                                    <label class="form-check-label" for="remember">Remember Me</label>
                                </div>
                                <a href="#" class="text-primary text-decoration-none small fw-bold">Forgot Password?</a>
                            </div>
                            <button type="submit" class="btn-premium">Sign In</button>
                        </form>
                        <div class="text-center mt-5">
                            <p class="mb-0">Don't have an account? <a href="{% url 'signup' %}" class="text-primary fw-bold text-decoration-none">Create Account</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
