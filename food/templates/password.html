{% extends 'base.html' %}
{% load static %}

{% block title %}Change Password - FOODIED{% endblock title %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8">
                <div class="auth-card">
                    <div class="auth-header text-center mb-5">
                        <h2 class="fw-bold">Security</h2>
                        <p class="text-muted">Update your account password</p>
                    </div>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase">Current Password</label>
                            <input type="password" name="current_password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-uppercase">New Password</label>
                            <input type="password" name="new_password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <div class="mb-5">
                            <label class="form-label small fw-bold text-uppercase">Confirm New Password</label>
                            <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow-sm">
                            Update Password
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <a href="{% url 'profile' %}" class="text-decoration-none small fw-bold">Back to Profile</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock content %}
